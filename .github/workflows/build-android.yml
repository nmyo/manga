name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Init Android project
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          pnpm tauri android init

      - name: Build APK (arm64)
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          pnpm tauri android build --target aarch64 --split-per-abi

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find src-tauri/gen/android -name "*.apk" -path "*/release/*" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Sign APK
        run: |
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          SIGNED_APK="${APK_PATH%.apk}-signed.apk"
          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner" sign \
            --ks release.jks \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out "$SIGNED_APK" \
            "$APK_PATH"
          echo "Signed APK: $SIGNED_APK"
          mv "$SIGNED_APK" "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jm-boom-android
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30
