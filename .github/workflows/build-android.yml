name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: pnpm add -D @tauri-apps/cli

      - name: Init Android project
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          pnpm tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Build APK (arm64)
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973
          pnpm tauri android build --target aarch64 --split-per-abi
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: List build outputs
        run: |
          find src-tauri/gen/android -name "*.apk" -o -name "*.aab" | head -20
          ls -la src-tauri/gen/android/app/build/outputs/apk/*/release/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jm-boom-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          retention-days: 30
